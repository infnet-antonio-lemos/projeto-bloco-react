<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" width="40" height="40">
  <!-- Outer coin ring -->
  <circle cx="24" cy="24" r="22" stroke="#00d4ff" stroke-width="2.5" fill="#0f1419"/>
  <!-- Inner coin ring -->
  <circle cx="24" cy="24" r="18" stroke="#00d4ff" stroke-width="1" fill="none" opacity="0.3"/>
  <!-- Rising chart line -->
  <polyline points="10,32 16,26 21,29 28,18 38,14" stroke="#00d4ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Arrow head at end of chart -->
  <polyline points="33,11 38,14 35,19" stroke="#00d4ff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Data point dots -->
  <circle cx="16" cy="26" r="2" fill="#00d4ff"/>
  <circle cx="21" cy="29" r="2" fill="#00d4ff"/>
  <circle cx="28" cy="18" r="2" fill="#00d4ff"/>
  <!-- Glow effect dot at start -->
  <circle cx="10" cy="32" r="2" fill="#00d4ff" opacity="0.6"/>
</svg>
